<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Paisagem de Campo Realista</title>
    <style>
        /* O CSS FOI COLOCADO DIRETAMENTE AQUI DENTRO */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Definimos uma base de tamanho de fonte que o JavaScript vai alterar */
        html {
            font-size: 16px; 
            transition: font-size 0.2s ease;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            background-color: #1b4332; /* Fundo verde escuro de segurança */
        }

        .cenario-realista {
            width: 100%;
            height: 100%;
            /* LINK ATUALIZADO: Agora com uma imagem real de um campo verde */
            background-image: url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* PAINEL DE ACESSIBILIDADE NO CANTO SUPERIOR DIREITO */
        .painel-acessibilidade {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .btn-acessibilidade {
            background: #007bff; /* Cor azul bem visível para você encontrar fácil */
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 12px 18px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            transition: transform 0.1s, background 0.2s;
        }
