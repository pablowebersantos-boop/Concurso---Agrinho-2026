<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Sustentável</title>
    <style>
        /* Remove as margens padrão do navegador */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Arial', sans-serif;
        }

        /* Configuração do container da imagem de fundo */
        .bg-banner {
            /* Substitua o link abaixo pela URL da imagem da sua lavoura */
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('https://images.unsplash.com/photo-1500937386664-56d1dfef3854?q=80&w=2070');
            
            /* Garante que a imagem cubra toda a tela e fique centralizada */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            
            /* Flexbox para centralizar o texto perfeitamente no meio */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Estilização do texto */
        .texto-central {
            color: white;
            font-size: 3.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
            text-align: center;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <div class="bg-banner">
        <h1 class="texto-central">O Futuro Sustentável</h1>
    </div>

</body>
</html>
