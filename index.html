<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Agrinho 2026</title>
    <style>
        body {
            background-color: #004B23;
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.1);
            border: 4px solid #39FF14;
            border-radius: 15px;
            padding: 30px;
            max-width: 550px;
            margin: 30px auto;
        }
        h1 {
            color: #FFD60A;
            font-size: 40px;
            margin-bottom: 10px;
        }
        p {
            font-size: 18px;
            line-height: 1.5;
        }
        .pergunta {
            font-size: 22px;
            color: #FFD60A;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .botao {
            display: block;
            width: 100%;
            background-color: #FFFFFF;
            color: #004B23;
            padding: 15px;
            margin: 12px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .botao:hover {
            background-color: #FF6B00;
            color: #FFFFFF;
        }
    </style>
</head>
<body>

    <h1>AGRINHO 2026</h1>
    <p>O futuro do campo e da sustentabilidade começa aqui.</p>

    <div class="container">
        <div class="pergunta">Desafio do Avaliador: Como a tecnologia ajuda o pequeno produtor?</div>
        
        <button class="botao" onclick="alert('🎉 Correto! Otimizando recursos e gerando sustentabilidade.')">
            A) Economizando água e insumos com sensores inteligentes.
        </button>
        
        <button class="botao" onclick="alert('❌ Tente novamente! O foco é usar a tecnologia a favor do meio ambiente.')">
            B) Afastando a tecnologia e voltando ao passado do campo.
        </button>
    </div>

</body>
</html>
