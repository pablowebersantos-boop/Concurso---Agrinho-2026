<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Agrinho 2026</title>
    <style>
        body {
            background: #004B23;
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px 20px;
        }
        h1 {
            color: #FFD60A;
            font-size: 3rem;
            text-transform: uppercase;
        }
        p {
            font-size: 1.5rem;
        }
        .caixa-interativa {
            background: rgba(255, 255, 255, 0.1);
            border: 4px solid #39FF14;
            border-radius: 15px;
            padding: 20px;
            max-width: 500px;
            margin: 30px auto;
        }
        .botao {
            display: block;
            width: 100%;
            background: #FFFFFF;
            color: #004B23;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }
        .botao:hover {
            background: #FFD60A;
        }
    </style>
</head>
<body>

    <h1>Agrinho 2026</h1>
    <p>O futuro do campo e da sustentabilidade começa com a tecnologia!</p>

    <div class="caixa-interativa">
        <h3>Pergunta ao Avaliador:</h3>
        <p style="font-size: 1.2rem;">Qual o foco do nosso projeto?</p>
        
        <button class="botao" onclick="alert('🎉 Resposta Correta! Nosso foco é a inovação sustentável.')">Opção A: Sustentabilidade e Tecnologia</button>
        <button class="botao" onclick="alert('❌ Tente novamente! O foco principal envolve tecnologia verde.')">Opção B: Desmatamento e Poluição</button>
    </div>

</body>
</html>
